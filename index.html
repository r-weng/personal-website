<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rui Weng</title>
    <script>
      (function () {
        try {
          // manual choice wins; otherwise follow the clock (day = 6am-6pm).
          // key is 'theme-override' — the old 'theme' key was auto-written on
          // every visit, so it can't be trusted as a deliberate choice
          var stored = localStorage.getItem('theme-override');
          var hour = new Date().getHours();
          var theme = stored || (hour >= 6 && hour < 18 ? 'light' : 'dark');
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
